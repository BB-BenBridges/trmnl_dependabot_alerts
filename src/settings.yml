---
strategy: polling
no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: get
framework_version: 3.1.1
serverless_language: node
polling_url:
polling_headers:
polling_body:
id: 370766
oauth_enabled: 'false'
oauth_pkce_enabled: 'no'
oauth_authorize_url: ''
oauth_token_url: ''
oauth_scopes: ''
oauth_scope_separator: ''
oauth_refresh_url: ''
oauth_auth_params:
oauth_token_headers:
oauth_token_site: ''
oauth_token_params:
oauth_token_request_auth_method: ''
oauth_body_format: ''
oauth_token_response_metadata: ''
oauth_authorization_method: ''
oauth_refresh_params: ''
oauth_token_field_name: ''
oauth_expiry_field_name: ''
oauth_expiry_strategy: ''
oauth_fixed_expiry_ms: ''
custom_fields:
- keyname: about
  name: About This Plugin
  field_type: author_bio
  category: programming
  email_address: bsbsupport@pm.me
  description: Surfaces open Dependabot security alerts for a GitHub organisation, broken down by severity and affected repos, right on your TRMNL display.<br><br><strong>Setup:</strong><br>&bull; <strong>GitHub Organisation</strong> - the org name to check (e.g. "my-company").<br>&bull; <strong>GitHub PAT</strong> - a token with permission to read org Dependabot alerts. Use a classic PAT with the security_events scope plus org read access, or a fine-grained PAT with Dependabot alerts Read permission.
- keyname: github_org
  field_type: string
  name: GitHub Organisation
  description: GitHub Organisation Name
  placeholder: github_org
- keyname: github_pat
  field_type: password
  name: GitHub PAT
  description: GitHub Personal Access Token with Dependabot alerts read access - classic PAT needs security_events scope plus org read access; fine-grained PAT needs Dependabot alerts Read permission.
  placeholder: pat_xxyyzz123
name: Dependabot Alerts
refresh_interval: 15
oauth_connection_config:
